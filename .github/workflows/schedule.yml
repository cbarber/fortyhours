name: scheduled-timesheet

on:
  schedule:
    # Sunday 6pm US/Eastern. GitHub Actions cron is UTC-only and has no DST
    # awareness, so this is two entries approximating EST/EDT by month:
    - cron: '0 23 * 11,12,1,2,3 0' # Nov-Mar (EST, UTC-5): 6pm ET = 23:00 UTC
    - cron: '0 22 * 4-10 0' # Apr-Oct (EDT, UTC-4): 6pm ET = 22:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run. Show config only'
        default: false
        type: boolean

jobs:
  autofill-and-submit:
    runs-on: ubuntu-latest
    env:
      PRODUCTIVE_API_KEY: ${{ secrets.PRODUCTIVE_API_KEY }}
      PRODUCTIVE_ORG_ID: ${{ vars.PRODUCTIVE_ORG_ID }}
      PRODUCTIVE_PERSON_ID: ${{ vars.PRODUCTIVE_PERSON_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make build
      - run: ./fortyhours config show
      - run: ./fortyhours autofill week --fill "${{ vars.FORTYHOURS_AUTOFILL }}"
        if: ${{ !inputs.dry_run }}
      - run: ./fortyhours timesheets submit week
        if: ${{ !inputs.dry_run }}
