openapi: 3.1.0
info:
  title: API Documentation
paths: {}
components:
  schemas:
    resource_booking:
      type: object
      title: Booking Resource
      properties:
        task_id:
          type: integer
          title: Task
          description: The ID of the task associated with this booking, if applicable.
          example:
          - 123
        before:
          type: string
          title: Before
          format: date
          description: Internal field used for date-range filtering.
          example:
            eq: value
        approved_at:
          type: string
          title: Approved At
          format: date-time
          description: Timestamp when the booking was approved, or null if not yet
            approved.
          example:
            gt: '2026-01-01'
        time:
          type: integer
          title: Time
          description: The booked time in minutes per day.
          example:
            gt: 0
        after:
          type: string
          title: After
          format: date
          description: Internal field used for date-range filtering.
          example:
            eq: value
        canceler:
          title: Canceler
          description: The person who canceled this booking.
          example:
            eq: value
        draft:
          type: boolean
          title: Draft
          description: Whether the booking is tentative (draft) or confirmed.
          example:
            eq: value
        id:
          type: integer
          title: Id
          description: Unique identifier of the booking.
          example:
          - 123
        approved:
          title: Approved
          description: Indicates whether the booking has been approved.
          example:
            eq: value
        percentage:
          type: integer
          title: Percentage
          description: Scheduled time as a percentage of the person's daily capacity.
          example:
            eq: value
        project_type:
          enum:
          - 1
          - 2
          type: integer
          title: Project Type
          description: Type of the associated project (e.g. billable or internal).
          example:
            eq: active
        external_id:
          type: string
          title: External
          description: External identifier for integration with third-party systems.
          example:
          - 123
        approver_id:
          type: integer
          title: Approver
          description: The ID of the person who approved this booking.
          example:
          - 123
        autotracking:
          type: boolean
          title: Autotracking
          description: When true, time entries are automatically tracked against this
            booking.
          example:
            eq: value
        task:
          title: Task
          description: The task associated with this booking, if applicable.
          example:
            eq: value
        attachments:
          title: Attachments
          description: Files attached to this booking.
          example:
            eq: value
        updated_at:
          type: string
          title: Updated At
          format: date-time
          description: Timestamp when this booking was last updated.
          example:
            gt: '2026-01-01'
        rejected_at:
          type: string
          title: Rejected At
          format: date-time
          description: Date when the booking was rejected.
          example:
            gt: '2026-01-01'
        rejected_reason:
          type: string
          title: Rejected Reason
          description: Reason provided when the booking was rejected.
          example:
            eq: value
        creator:
          title: Creator
          description: The person who created this booking.
          example:
            eq: value
        resource_request:
          title: Resource Request
          description: The resource request this booking fulfills, if applicable.
          example:
            eq: value
        attachment_ids:
          title: Attachment Ids
          description: Array of IDs of files attached to this booking.
          example:
          - 123
          - 456
        canceled_at:
          type: string
          title: Canceled At
          format: date-time
          description: Date when the booking was canceled.
          example:
            gt: '2026-01-01'
        ended_on:
          type: string
          title: Ended On
          format: date
          description: Booking end date.
          example:
            eq: value
        people_custom_fields:
          type: string
          title: People Custom Fields
          description: Custom field values defined on the assigned person.
          example:
            eq: value
        rejected:
          title: Rejected
          description: Whether this booking has been rejected.
          example:
            eq: value
        resource_request_id:
          type: integer
          title: Resource Request
          description: ID of the resource request this booking fulfills.
          example:
          - 123
        origin_id:
          type: integer
          title: Origin
          description: The ID of the origin record (e.g. resource request) that created
            this booking.
          example:
          - 123
        with_draft:
          type: boolean
          title: With Draft
          description: When true, draft bookings are included in availability and
            planning views.
          example:
            eq: value
        stage_type:
          enum:
          - 1
          - 2
          type: integer
          title: Stage Type
          description: The stage type of the booking within the resource planning
            workflow.
          example:
            eq: active
        custom_field_people:
          title: Custom Field People
          description: People linked via custom fields on this booking.
          example:
            eq: value
        last_activity_at:
          type: string
          title: Last Activity At
          format: date-time
          description: Timestamp of the last activity recorded on this booking.
          example:
            gt: '2026-01-01'
        service:
          title: Service
          description: The budget service being scheduled in this booking.
          example:
            eq: value
        hours:
          type: integer
          title: Hours
          description: Scheduled hours per day for this booking.
          example:
            eq: value
        origin:
          title: Origin
          description: The booking origin (e.g. the resource request that generated
            this booking).
          example:
            eq: value
        created_at:
          type: string
          title: Created At
          format: date-time
          description: Date when the booking was created.
          example:
            gt: '2026-01-01'
        updater:
          title: Updater
          description: The person who last updated this booking.
          example:
            eq: value
        approval_statuses:
          title: Approval Statuses
          description: Per-approver approval status records for this booking.
          example:
            eq: active
        service_id:
          type: integer
          title: Service
          description: The ID of the service this booking is scheduled against.
          example:
          - 123
        rejecter:
          title: Rejecter
          description: The person who rejected this booking.
          example:
            eq: value
        person_subsidiary_id:
          type: integer
          title: Person Subsidiary
          description: ID of the subsidiary the assigned person belongs to.
          example:
          - 123
        person_id:
          type: integer
          title: Person
          description: ID of the person assigned to this booking.
          example:
          - 123
        scenario_item:
          title: Scenario Item
          description: The scenario item this booking is linked to, if created from
            a scenario.
          example:
            eq: value
        project_id:
          type: integer
          title: Project
          description: ID of the project this booking relates to.
          example:
          - 123
        budget_id:
          type: integer
          title: Budget
          description: ID of the budget (deal) associated with the booking's service.
          example:
          - 123
        total_time:
          type: integer
          title: Total Time
          description: The total booked time in minutes across the entire booking
            period.
          example:
            gt: 0
        note:
          type: string
          title: Note
          description: An optional note or description for this booking.
          example:
            eq: value
        person_type:
          enum:
          - 1
          - 2
          - 3
          - 4
          type: integer
          title: Person Type
          description: Type of the assigned person (e.g. employee, contractor, placeholder).
          example:
            eq: active
        total_working_days:
          type: integer
          title: Total Working Days
          description: The total number of working days covered by this booking.
          example:
            eq: value
        approver:
          title: Approver
          description: The person who approved this booking.
          example:
            eq: value
        status:
          title: Status
          description: The current approval status of the booking (e.g. pending, approved,
            rejected).
          example:
            eq: active
        event:
          title: Event
          description: The absence event category (e.g. vacation, sick leave) for
            absence bookings.
          example:
            eq: value
        company_id:
          type: integer
          title: Company
          description: ID of the client company associated with this booking.
          example:
          - 123
        custom_field_attachments:
          title: Custom Field Attachments
          description: File attachments linked via custom fields on this booking.
          example:
            gt: '2026-01-01'
        approval_status:
          enum:
          - 1
          - 2
          - 3
          - 5
          type: integer
          title: Approval Status
          description: Whether the booking has been approved. Reflects the overall
            approval_status.
          example:
            eq: active
        custom_fields:
          type: object
          title: Custom Fields
          description: Custom field values for this booking.
          example:
            eq: value
        event_id:
          type: integer
          title: Event
          description: ID of the absence event category for this booking.
          example:
          - 123
        person:
          title: Person
          description: The person assigned to this booking.
          example:
            eq: value
        organization:
          title: Organization
          description: The organization this booking belongs to.
          example:
            eq: value
        canceled:
          type: boolean
          title: Canceled
          description: Whether this booking has been canceled.
          example:
            eq: value
        booking_method_id:
          enum:
          - 1
          - 2
          - 3
          type: integer
          title: Booking Method
          description: ID of the booking method used to create this booking (e.g.
            hours per day, percentage, total hours).
          example:
          - 123
        tags:
          type: integer
          title: Tags
          description: Tags associated with this booking.
          example:
            eq: value
        started_on:
          type: string
          title: Started On
          format: date
          description: The start date of the booking.
          example:
            eq: value
        use_salary_currency:
          type: boolean
          title: Use Salary Currency
          description: When true, cost calculations use the person's salary currency
            instead of the service currency.
          example:
            eq: value
        billing_type_id:
          enum:
          - 1
          - 2
          - 3
          - 4
          type: integer
          title: Billing Type
          description: ID of the billing type of the associated service.
          example:
          - 123
        booking_type:
          type: string
          title: Booking Type
          description: Whether this is a project booking or an absence booking.
          example:
            eq: active
      description: A booking represents planned work or an absence scheduled for a
        person, linked to a service or absence category.
      example:
        id: '1594'
        type: bookings
        attributes:
          hours: 8
          time: 480
          started_on: '2026-03-17'
          ended_on: '2026-03-21'
          total_time: 2400
          total_working_days: 5
          percentage: null
          note: null
          created_at: '2026-03-01T09:00:00.000+00:00'
          updated_at: '2026-03-01T09:00:00.000+00:00'
          people_custom_fields: {}
          approved: false
          approved_at: null
          rejected: false
          rejected_reason: null
          rejected_at: null
          canceled: false
          canceled_at: null
          booking_method_id: 1
          autotracking: false
          draft: false
          custom_fields: null
          last_activity_at: '2026-03-01T09:00:00.000+00:00'
        relationships:
          person:
            data:
              type: people
              id: '12'
          service:
            data:
              type: services
              id: '1856422'
          event:
            data: null
          task:
            data: null
    resource_event:
      type: object
      title: Event Resource
      properties:
        organization:
          title: Organization
          description: The organization this event belongs to.
          example:
            eq: value
        description:
          type: string
          title: Description
          example:
            eq: value
        archived_at:
          type: string
          title: Archived At
          format: date-time
          description: Timestamp when this event was archived, or null if it is still
            active.
          example:
            gt: '2026-01-01'
        half_day_bookings:
          type: boolean
          title: Half Day Bookings
          description: When true, bookings for this event can be created in half-day
            increments.
          example:
            eq: value
        limitation_type_id:
          enum:
          - 2
          - 3
          - 4
          type: integer
          title: Limitation Type
          description: 'ID of the limitation type controlling how time-off for this
            event is tracked: limited by days (2), limited by hours (3), or unlimited
            by hours (4).'
          example:
          - 123
        id:
          type: integer
          title: Id
          description: The unique identifier of this event.
          example:
          - 123
        icon_id:
          type: string
          title: Icon
          description: The icon identifier used to visually represent this event in
            the UI.
          example:
          - 123
        status:
          enum:
          - 1
          - 2
          type: integer
          title: Status
          description: The archival status of this event, either active (1) or archived
            (2).
          example:
            eq: active
        sync_personal_integrations:
          type: boolean
          title: Sync Personal Integrations
          description: When true, bookings for this event are automatically synced
            to personal calendar integrations.
          example:
            eq: value
        color_id:
          title: Color
          description: ID of the color associated with this event for display purposes.
          example:
          - 123
        absence_type:
          enum:
          - time_off
          - remote_work
          type: string
          title: Absence Type
          description: The absence category of this event, either time_off (standard
            time-off) or remote_work.
          example:
            eq: active
        limited:
          type: boolean
          title: Limited
          description: When true, this event has a limit on the amount of time-off
            that can be booked.
          example:
            eq: value
        event_type_id:
          enum:
          - 1
          - 2
          type: integer
          title: Event Type
          description: ID of the event type indicating whether this absence is paid
            (1) or unpaid (2).
          example:
          - 123
        name:
          type: string
          title: Name
          description: The display name of this event.
          example:
            eq: value
        limitation_type:
          enum:
          - 2
          - 3
          - 4
          type: integer
          title: Limitation Type
          description: The limitation type of this event used for filtering (limited
            by days, limited by hours, or unlimited by hours).
          example:
            eq: active
      description: An absence event type (e.g. vacation, sick leave) used to categorize
        time-off bookings in the resource planner.
      example:
        id: '123'
        type: events
        attributes:
          event_type: task.created
          occurred_at: '2026-01-15T10:00:00Z'
          payload: {}
        relationships: {}
    resource_person:
      type: object
      title: Person Resource
      properties:
        accessible_project_id:
          type: integer
          title: Accessible Project
          description: Filter by accessible project ID — returns people who have access
            to the specified project.
          example:
          - 123
        project_id:
          type: integer
          title: Project
          description: Filter by project ID — returns people who are members of the
            specified project.
          example:
          - 123
        project_watching:
          type: integer
          title: Project Watching
          description: Filter by project_watching — returns people who are auto-subscribed
            to the specified project.
          example:
            eq: value
        email:
          type: string
          title: Email
          description: The person's email address.
          example:
            eq: value
        schedulable:
          type: boolean
          title: Schedulable
          description: Filter for schedulable people — returns employees, contractors,
            and placeholders who can be booked.
          example:
            eq: value
        import:
          title: Import
        holiday_calendar_id:
          type: integer
          title: Holiday Calendar
          description: ID of the holiday calendar assigned to this person for scheduling
            and time-off calculations.
          example:
          - 123
        full_query:
          type: string
          title: Full Query
          description: Full text search filter — matches against name and other indexed
            fields.
          example:
            eq: value
        company_name:
          title: Company Name
          description: The name of the company this person belongs to.
          example:
            eq: value
        autotracking:
          type: boolean
          title: Autotracking
          description: Whether automatic time tracking is enabled for this person.
          example:
            eq: value
        time_tracking_policy:
          title: Time Tracking Policy
          description: The time tracking policy assigned to this person.
          example:
            gt: 0
        time_unlocked_end_date:
          type: string
          title: Time Unlocked End Date
          format: date
          description: End date of the time unlock window.
          example:
            gt: '2026-01-01'
        deactivated_at:
          type: string
          title: Deactivated At
          format: date-time
          description: Timestamp when this person was deactivated, or null if currently
            active.
          example:
            gt: '2026-01-01'
        status_text:
          type: string
          title: Status Text
          description: Short text message shown as the person's current status.
          example:
            eq: active
        granular_notification_preferences:
          type: object
          title: Granular Notification Preferences
          description: Granular notification preferences for this person.
          example:
            eq: value
        custom_role:
          title: Custom Role
          description: The custom role (permission set) assigned to this person.
          example:
            eq: value
        archived_at:
          type: string
          title: Archived At
          format: date-time
          description: Timestamp when this person was archived, or null if not archived.
          example:
            gt: '2026-01-01'
        id:
          type: integer
          title: Id
          description: The unique identifier of the person.
          example:
          - 123
        custom_field_people:
          title: Custom Field People
          description: People referenced in custom field values for this person.
          example:
            eq: value
        manager_id:
          type: integer
          title: Manager
          description: ID of the person who is this person's direct manager.
          example:
          - 123
        sample_data:
          type: boolean
          title: Sample Data
          description: Whether this person was created as part of sample/demo data.
          example:
            eq: value
        two_factor_auth:
          type: boolean
          title: Two Factor Auth
          description: Whether two-factor authentication is enabled for this person's
            user account.
          example:
            eq: value
        bookings_before:
          type: string
          title: Bookings Before
          format: date
          description: Filter by bookings_before date — used with resourcing filters
            to find people with bookings starting on or before this date.
          example:
            eq: value
        avatar_url:
          type: string
          title: Avatar Url
          description: URL of the person's avatar thumbnail.
          example:
            eq: value
        organization:
          title: Organization
          description: The organization this person belongs to.
          example:
            eq: value
        subsidiary_id:
          type: integer
          title: Subsidiary
          description: ID of the subsidiary company this person belongs to, if any.
          example:
          - 123
        virtual:
          type: boolean
          title: Virtual
          description: Whether this is a virtual person record.
          example:
            eq: value
        subsidiary:
          title: Subsidiary
          description: The subsidiary (workplace) this person is associated with.
          example:
            eq: value
        bookings_after:
          type: string
          title: Bookings After
          format: date
          description: Filter by bookings_after date — used with resourcing filters
            to find people with bookings ending on or after this date.
          example:
            eq: value
        jump_query:
          type: string
          title: Jump Query
          description: Quick jump search filter — matches against name for navigation
            shortcuts.
          example:
            eq: value
        joined_at:
          type: string
          title: Joined At
          format: date-time
          description: Date when this person joined the organization.
          example:
            gt: '2026-01-01'
        time_unlocked:
          type: boolean
          title: Time Unlocked
          description: Whether the person's time entries are unlocked for editing
            outside the normal window.
          example:
            gt: 0
        custom_role_id:
          type: integer
          title: Custom Role
          description: ID of the custom role assigned to this person, if any.
          example:
          - 123
        service_type_id:
          type: integer
          title: Service Type
          description: Filter by service type ID — returns people assigned to the
            specified service types.
          example:
          - 123
        status:
          enum:
          - 1
          - 2
          type: integer
          title: Status
          description: 'Filter by person status: 1 (active) or 2 (deactivated).'
          example:
            eq: active
        tags:
          type: string
          title: Tags
          description: Tags applied to this person.
          example:
            eq: value
        time_tracking_policy_id:
          type: integer
          title: Time Tracking Policy
          description: ID of the time tracking policy applied to this person.
          example:
          - 123
        hrm_type_id:
          enum:
          - 1
          - 2
          type: integer
          title: Hrm Type
          description: 'HRM type ID: 1 for employee, 2 for contact. Null for placeholders.'
          example:
          - 123
        custom_field_attachments:
          title: Custom Field Attachments
          description: File attachments associated with this person via custom fields.
          example:
            gt: '2026-01-01'
        external_id:
          type: string
          title: External
          description: External identifier for syncing this person with an external
            system.
          example:
          - 123
        accessible_deal_id:
          type: integer
          title: Accessible Deal
          description: Filter by accessible deal ID — returns people who have access
            to the specified deal.
          example:
          - 123
        fuzzy_people:
          type: string
          title: Fuzzy People
          description: Fuzzy people filter for approximate person name matching.
          example:
            eq: value
        subscribable_id:
          type: integer
          title: Subscribable
          description: Filter by subscribable ID — returns subscribers of the specified
            resource.
          example:
          - 123
        fuzzy_dates:
          type: string
          title: Fuzzy Dates
          description: Fuzzy date filter for approximate date matching.
          example:
            gt: '2026-01-01'
        query:
          type: string
          title: Query
          description: Text search filter — matches by full name (exact) or contains
            partial name.
          example:
            eq: value
        accessible_filter_id:
          type: string
          title: Accessible Filter
          description: Filter by accessible filter ID — returns people who are members
            of the specified saved view or filter.
          example:
          - 123
        offboarding_id:
          type: integer
          title: Offboarding
          description: ID of the offboarding process associated with this person's
            deactivation.
          example:
          - 123
        approval_policy_assignment:
          title: Approval Policy Assignment
          description: The approval policy assignment for this person.
          example:
            eq: value
        last_name:
          type: string
          title: Last Name
          description: The person's last name.
          example:
            eq: value
        agent:
          type: boolean
          title: Agent
          description: The AI agent account linked to this person, if this person
            represents an AI agent.
          example:
            eq: value
        first_name:
          type: string
          title: First Name
          description: The person's first name.
          example:
            eq: value
        time_unlocked_period_id:
          type: integer
          title: Time Unlocked Period
          description: Period identifier for the time unlock.
          example:
          - 123
        team:
          type: integer
          title: Team
          description: Filter by team ID — returns people who belong to the specified
            team(s).
          example:
            eq: value
        company:
          title: Company
          description: The company (client) this person belongs to.
          example:
            eq: value
        offboarding_status:
          enum:
          - not_initiated
          - in_progress
          - failed
          - completed
          type: string
          title: Offboarding Status
          description: 'Current offboarding status: not_initiated, in_progress, or
            completed.'
          example:
            eq: active
        account_id:
          title: Account
          description: The organization (account) ID.
          example:
          - 123
        approval_policy_id:
          type: integer
          title: Approval Policy
          description: ID of the approval policy assigned to this person for time-off
            and booking approvals.
          example:
          - 123
        created_at:
          type: string
          title: Created At
          format: date-time
          description: Timestamp when this person was created.
          example:
            gt: '2026-01-01'
        permissions:
          type: string
          title: Permissions
          description: Filter by permission set — returns people with the specified
            permission slugs.
          example:
            eq: value
        placeholder:
          type: boolean
          title: Placeholder
          description: Whether this person is a placeholder used for resource planning,
            without a real user account.
          example:
            eq: value
        subscriber_ids:
          title: Subscriber Ids
          description: IDs of people subscribed to follow this person.
          example:
          - 123
          - 456
        status_emoji:
          type: string
          title: Status Emoji
          description: Emoji shown as the person's current status indicator.
          example:
            eq: active
        service_types:
          title: Service Types
          description: The service types this person delivers.
          example:
            eq: active
        time_off_status_sync:
          type: boolean
          title: Time Off Status Sync
          description: Whether this person's time-off status is synced from an external
            calendar.
          example:
            gt: 0
        availabilities:
          title: Availabilities
          description: The person's work availability windows.
          example:
            eq: value
        external_sync:
          type: boolean
          title: External Sync
          description: Whether this person is managed by an external sync integration.
          example:
            eq: value
        tag_list:
          title: Tag List
          description: Comma-separated list of tags applied to this person.
